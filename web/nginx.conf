server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  location = / {
    return 302 /web/index.html;
  }

  location = /schedule {
    alias /usr/share/nginx/html/web/schedule.html;
  }

  location = /web/schedule {
    alias /usr/share/nginx/html/web/schedule.html;
  }

  location = /standings {
    alias /usr/share/nginx/html/web/standings.html;
  }

  location = /web/standings {
    alias /usr/share/nginx/html/web/standings.html;
  }

  location = /batting {
    alias /usr/share/nginx/html/web/batting.html;
  }

  location = /web/batting {
    alias /usr/share/nginx/html/web/batting.html;
  }

  location = /pitching {
    alias /usr/share/nginx/html/web/pitching.html;
  }

  location = /web/pitching {
    alias /usr/share/nginx/html/web/pitching.html;
  }

  location = /players {
    alias /usr/share/nginx/html/web/players.html;
  }

  location = /web/players {
    alias /usr/share/nginx/html/web/players.html;
  }

  location = /distance {
    alias /usr/share/nginx/html/web/distance.html;
  }

  location = /web/distance {
    alias /usr/share/nginx/html/web/distance.html;
  }

  location = /attendance {
    alias /usr/share/nginx/html/web/attendance.html;
  }

  location = /web/attendance {
    alias /usr/share/nginx/html/web/attendance.html;
  }

  location = /gametime {
    alias /usr/share/nginx/html/web/gametime.html;
  }

  location = /web/gametime {
    alias /usr/share/nginx/html/web/gametime.html;
  }

  location = /lab {
    alias /usr/share/nginx/html/web/lab.html;
  }

  location = /web/lab {
    alias /usr/share/nginx/html/web/lab.html;
  }

  location /web/ {
    alias /usr/share/nginx/html/web/;
  }

  location /web/data/ {
    alias /usr/share/nginx/html/web/data/;
  }

  location ~ ^/([^/]+\.(css|js))$ {
    alias /usr/share/nginx/html/web/$1;
  }

  location /data/ {
    alias /usr/share/nginx/html/data/;
  }
}
