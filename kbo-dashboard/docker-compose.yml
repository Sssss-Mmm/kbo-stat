version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: kbo-dashboard/backend/Dockerfile
    container_name: kbo_backend
    environment:
      DATABASE_URL: postgresql://kbo_user:kbo_password@postgres:5432/kbo_dashboard
    ports:
      - "8001:8001"
    volumes:
      # 호스트 data/ 를 마운트해 일일 크롤링 결과가 컨테이너에 바로 반영되게 한다.
      # (빌드타임 COPY data 스냅샷을 덮어쓴다.)
      - ../data:/app/data
    networks:
      - kbo_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    container_name: kbo_web
    ports:
      - "8000:80"
    networks:
      - kbo_network
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    container_name: kbo_dashboard_db
    environment:
      POSTGRES_USER: kbo_user
      POSTGRES_PASSWORD: kbo_password
      POSTGRES_DB: kbo_dashboard
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kbo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kbo_user -d kbo_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kbo_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - kbo_network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  kbo_network:
    driver: bridge
