version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kbo_dashboard_db
    environment:
      POSTGRES_USER: kbo_user
      POSTGRES_PASSWORD: kbo_password
      POSTGRES_DB: kbo_dashboard
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kbo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kbo_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kbo_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - kbo_network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  kbo_network:
    driver: bridge
