server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: 정적 파일이 없으면 index.html 로 폴백(클라이언트 라우팅).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 백엔드 API 프록시. 'backend' 는 docker-compose 서비스명(같은 네트워크 필요).
  # axios 가 상대경로 /api/... 로 호출하므로 prefix 를 그대로 backend 로 넘긴다.
  #
  # resolver(=Docker 내장 DNS) + 변수 proxy_pass 를 쓰면 backend 호스트명을
  # '기동 시'가 아니라 '요청 시'에 해석한다. 덕분에 backend 가 잠시 죽어 있어도
  # nginx(정적 사이트)는 정상 기동하고, backend 재시작에 따른 IP 변경도 따라간다.
  location /api/ {
    resolver 127.0.0.11 valid=30s;
    set $kbo_backend http://backend:8001;
    proxy_pass $kbo_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
